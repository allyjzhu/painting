<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="images/favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ally Zhu</title>
  <style>
    body {
      margin: 0;
      font-family: "Times New Roman", serif;
      background-color: #3c3c3c;
      color: #efd645;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 80px;
      padding: 20px;
    }

    .name {
      font-size: 15px;
      margin-bottom: 10px;
      position: fixed;
    }

    .menu {
      list-style: none;
      padding: 0;
      margin-top: 20px;
      font-family: Arial, Helvetica, sans-serif;

    }

    .menu li {
      margin: 4px 0;
      cursor: pointer;
      font-size: 15px;
    }

    .menu li:hover,
    .menu li.active {
      text-decoration: underline;
    }

    .content {
      display:block;
      padding-top: 100px;
      padding-bottom: 7%;
      
    }

    .artwork {
      max-width: 30vw;
      height: 100%;
      display: none;
    }

    .artwork img {
      width: 100%;
      height: auto;
      display: block;
      cursor: zoom-in;
    }

    .placeholder {
      color: #bdbbb3;
      font-size: 18px;
      text-align: center;
    }
    /* Zoom overlay styles */
    .zoom-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }
    .zoom-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .zoom-overlay img {
      max-width: 90vw;
      max-height: 90vh;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      cursor: zoom-out;
      border-radius: 2px;
      transition: transform 200ms ease;
    }
    /* Instagram bottom-left icon */
    .ig-link {
      position: fixed;
      left: 12px;
      bottom: 12px;
      width: 50px;
      height: 42px;
      display: inline-block;
      z-index: 1000;
      cursor: pointer;
      overflow: hidden;
    }
    .ig-link img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
  
    @media (max-width: 480px) {
      .ig-link { width: 46px; height: 36px; left: 10px; bottom: 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="name">Ally Zhu </div>
      <ul class="menu" id="menu">
        <br><br>
        <li data-target="work1">1</li>
        <li data-target="work2">2</li>
        <li data-target="work3">3</li>
        <li data-target="work4">4</li>
        <li data-target="work5">5</li>
        <li data-target="work6">6</li>
      </ul>
    </aside>

    <main class="content">
      <div class="placeholder" id="placeholder">
      </div>

      <!-- Replace src with your actual image files -->
      <div class="artwork" id="work1">
        <img src="images/work1.jpg" alt="Artwork 1" />
        <div id="work-title"><br>Necessary Angels<br>11 x 14 in., Stretched canvas</div>
      </div>
      <div class="artwork" id="work2">
        <img src="images/work2.jpg" alt="Artwork 2" />
        <div id="work-title"><br>I Love You, B<br>9 x 12 in., Canvas</div>
      </div>
      <div class="artwork" id="work3">
        <img src="images/work3.jpg" alt="Artwork 3" />
        <div id="work-title"><br>Untitled<br>8 x 10 in., Wood panel</div>

      </div>
      <div class="artwork" id="work4">
        <img src="images/work4.jpg" alt="Artwork 4" />
                <div id="work-title"><br>Untitled<br>16 x 20 in., Stretched canvas</div>

      </div>
      <div class="artwork" id="work5">
        <img src="images/work5.jpg" alt="Artwork 5" />
                <div id="work-title"><br>Untitled<br>10 x 20 in., Stretched canvas</div>

      </div>
      <div class="artwork" id="work6">
        <img src="images/work6.jpeg" alt="Artwork 6" />
        <div id="work-title"><br>Living Currency<br>8 x 10 in., Canvas sheet</div>

      </div>
    </main>
  </div>

  <!-- Zoom overlay injected for centered image zoom -->
  <div class="zoom-overlay" id="zoomOverlay" aria-hidden="true"></div>

  <!-- Instagram quick link (bottom-left) -->
  <a class="ig-link" href="https://instagram.com/allyjzhu" target="_blank" rel="noopener noreferrer" aria-label="Open Instagram">
    <img src="images/iglink.jpg" alt="Instagram" />
  </a>

  <script>
    const menuItems = document.querySelectorAll('#menu li');
    const artworks = document.querySelectorAll('.artwork');

    menuItems.forEach(item => {
      item.addEventListener('click', () => {
        // update active state
        menuItems.forEach(i => i.classList.remove('active'));
        item.classList.add('active');

        // hide all artworks
        artworks.forEach(art => (art.style.display = 'none'));

        // show selected artwork
        const target = document.getElementById(item.dataset.target);
        if (target) {
          placeholder.style.display = 'none';
          target.style.display = 'block';
        }
      });
    });

    // --- Image zoom behavior ---
    (function() {
      const overlay = document.getElementById('zoomOverlay');
      const imgEls = document.querySelectorAll('.artwork img');

      function openZoom(sourceImg) {
        overlay.innerHTML = '';
        const big = sourceImg.cloneNode(true);
        // ensure no id collision
        big.removeAttribute('id');
        overlay.appendChild(big);
        overlay.classList.add('open');
        overlay.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        window.addEventListener('keydown', onKeyDown);
      }

      function closeZoom() {
        overlay.classList.remove('open');
        overlay.setAttribute('aria-hidden', 'true');
        overlay.innerHTML = '';
        document.body.style.overflow = '';
        window.removeEventListener('keydown', onKeyDown);
      }

      function onKeyDown(e) {
        if (e.key === 'Escape') closeZoom();
      }

      // open when clicking an artwork image
      imgEls.forEach(img => {
        img.addEventListener('click', (e) => {
          openZoom(e.currentTarget);
        });
      });

      // clicking overlay closes it
      overlay.addEventListener('click', (e) => {
        // close when clicking outside the image or on the image
        closeZoom();
      });
    })();
  </script>
</body>
</html>
